server {
    listen 80;
    server_name localhost seu-dominio.com www.seu-dominio.com;

    # Oculta a versão do Nginx para segurança
    server_tokens off;

    # Direcionamento do desafio do Certbot (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    # Redireciona HTTP para HTTPS de forma permanente (301)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name localhost seu-dominio.com www.seu-dominio.com;

    # Oculta a versão do Nginx para segurança
    server_tokens off;

    # Configuração dos Certificados SSL/TLS
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Protocolos SSL seguros (desativa TLS 1.0 e 1.1 vulneráveis)
    ssl_protocols TLSv1.2 TLSv1.3;
    
    # Cifras de criptografia forte recomendadas para produção
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Cabeçalhos de Segurança (Security Headers)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval' ws: wss:;" always;

    # Limite máximo de tamanho para upload de arquivos
    client_max_body_size 15M;

    # Proxy reverso para o app Streamlit
    location / {
        proxy_pass http://app:8501;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Configurações obrigatórias para WebSockets (crucial para o funcionamento do Streamlit)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Aumentar timeouts para conexões WebSocket longas
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
