services:
  db:
    image: postgres:16
    env_file: .env
    volumes:
      - pgdata_v3:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    # Sem 'ports:' -> banco NAO exposto a internet, so rede interna.

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    ports:
      - "8501:8501"

volumes:
  pgdata_v3:
