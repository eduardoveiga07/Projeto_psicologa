services:
  db:
    image: postgres:16
    env_file: .env
    volumes:
      - pgdata_v3:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    # Sem 'ports:' -> banco NAO exposto a internet, so rede interna.

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    # Isola o app Streamlit da rede externa (porta acessível apenas para o Nginx internamente)
    expose:
      - "8501"

  nginx:
    image: nginx:alpine
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    restart: always

volumes:
  pgdata_v3:
  certbot-etc:
  certbot-var:
